services:
  todo-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - JENKINS_URL=${JENKINS_URL:-http://host.docker.internal:8080}
      - JENKINS_USER=${JENKINS_USER}
      - JENKINS_API_TOKEN=${JENKINS_API_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
